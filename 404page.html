<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found | Stackly</title>

<style>

/* STACKLY 404 PAGE */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f8fafc;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

/* CONTAINER */

.stackly-404-container{
max-width:500px;
padding:20px;
}

/* 404 TEXT */

.stackly-404-title{
font-size:120px;
font-weight:bold;
color:#047857;
margin-bottom:10px;
}

/* HEADING */

.stackly-404-heading{
font-size:28px;
color:#0f172a;
margin-bottom:15px;
}

/* MESSAGE */

.stackly-404-text{
color:#64748b;
margin-bottom:25px;
line-height:1.6;
}

/* BUTTON */

.stackly-404-btn{
display:inline-block;
background:#047857;
color:white;
padding:12px 30px;
border-radius:6px;
text-decoration:none;
font-weight:500;
}

.stackly-404-btn:hover{
background:#065f46;
}

/* MOBILE */

@media(max-width:600px){

.stackly-404-title{
font-size:80px;
}

.stackly-404-heading{
font-size:22px;
}

}

</style>

</head>

<body>

<div class="stackly-404-container">

<h1 class="stackly-404-title">404</h1>

<h2 class="stackly-404-heading">Oops! Page Not Found</h2>

<p class="stackly-404-text">
The page you are looking for might have been removed,
had its name changed, or is temporarily unavailable.
</p>

<a href="home2.html" class="stackly-404-btn">
Back to Home
</a>

</div>

</body>
</html>
